# stella_vslam 单目配置 — Logitech C920 @ 1280x720
# ⚠⚠ 内参 fx/fy/cx/cy 与畸变为按 C920 视场角(HFOV≈70.4°,VFOV≈43.3°)估算的占位值。
#     正式建图前务必用棋盘格标定本机镜头 (ros2 camera_calibration 或 OpenCV)，把真实值填进来——
#     单目 SLAM 对内参很敏感，估算值只够"先跑通看效果"。

Camera:
  name: "Logitech C920 (mono)"
  setup: "monocular"
  model: "perspective"

  # 估算值（待标定）：fx=fy≈ (w/2)/tan(HFOV/2)
  fx: 907.0
  fy: 907.0
  cx: 640.0
  cy: 360.0

  # 畸变（待标定；先置 0）
  k1: 0.0
  k2: 0.0
  p1: 0.0
  p2: 0.0
  k3: 0.0

  fps: 30.0
  cols: 1280
  rows: 720

  color_order: "RGB"

Preprocessing:
  min_size: 800

Feature:
  name: "default ORB feature extraction setting"
  scale_factor: 1.2
  num_levels: 8
  ini_fast_threshold: 20
  min_fast_threshold: 7

Mapping:
  backend: "g2o"
  baseline_dist_thr_ratio: 0.02
  redundant_obs_ratio_thr: 0.9
  num_covisibilities_for_landmark_generation: 20
  num_covisibilities_for_landmark_fusion: 20
  erase_temporal_keyframes: false
  num_temporal_keyframes: 15

Tracking:
  backend: "g2o"
  enable_temporal_keyframe_only_tracking: false

KeyframeInserter:
  wait_for_local_bundle_adjustment: false

Relocalizer:
  search_neighbor: true

LoopDetector:
  backend: "g2o"

System:
  map_format: "msgpack"
  num_grid_cols: 47
  num_grid_rows: 30

# 网页可视化（headless）。docker --net=host 下 viewer 容器监听 3000，浏览器看 3001。
SocketPublisher:
  server_uri: "http://127.0.0.1:3000"
