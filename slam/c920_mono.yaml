# stella_vslam 单目配置 — Logitech C920 @ 1280x720
# 内参已用 OpenCV 棋盘格标定（slam/calib_c920.py，8x5 内角点，19 视图，RMS=0.33px，2026-06-22）。

Camera:
  name: "Logitech C920 (mono, calibrated)"
  setup: "monocular"
  model: "perspective"

  # 标定值 (RMS 重投影误差 0.33px)
  fx: 946.8744
  fy: 951.8796
  cx: 638.3886
  cy: 341.3723

  # 畸变 (标定)
  k1: 0.048356
  k2: -0.202569
  p1: -0.003028
  p2: 0.002019
  k3: 0.183045

  fps: 30.0
  cols: 1280
  rows: 720

  color_order: "RGB"

Preprocessing:
  min_size: 800

Feature:
  name: "default ORB feature extraction setting"
  scale_factor: 1.2
  num_levels: 8
  ini_fast_threshold: 20
  min_fast_threshold: 7

Mapping:
  backend: "g2o"
  baseline_dist_thr_ratio: 0.02
  redundant_obs_ratio_thr: 0.9
  num_covisibilities_for_landmark_generation: 20
  num_covisibilities_for_landmark_fusion: 20
  erase_temporal_keyframes: false
  num_temporal_keyframes: 15

Tracking:
  backend: "g2o"
  enable_temporal_keyframe_only_tracking: false

KeyframeInserter:
  wait_for_local_bundle_adjustment: false

Relocalizer:
  search_neighbor: true

LoopDetector:
  backend: "g2o"

System:
  map_format: "msgpack"
  num_grid_cols: 47
  num_grid_rows: 30

# 网页可视化（headless）。docker --net=host 下 viewer 容器监听 3000，浏览器看 3001。
SocketPublisher:
  server_uri: "http://127.0.0.1:3000"
